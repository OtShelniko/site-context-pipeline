name: Release

# Build and publish to PyPI when a v*.*.* tag is pushed.
#
# Auth: PyPI Trusted Publishing (OIDC). No tokens stored anywhere.
# Setup:
#   1. Visit https://pypi.org/manage/account/publishing/ (or the project's
#      Publishing tab once it has a first manual release).
#   2. Add a "trusted publisher" with:
#        Owner:           OtShelniko
#        Repository name: site-context-pipeline
#        Workflow name:   release.yml
#        Environment:     pypi
#   3. Push a tag like `v0.1.1` to trigger this workflow.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build distributions
        run: python -m build

      - name: Verify the version in the tag matches pyproject
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#v}"
          pkg_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$tag_version pyproject=$pkg_version"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::tag version $tag_version does not match pyproject version $pkg_version"
            exit 1
          fi

      - name: Upload built distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest

    # Required for Trusted Publishing.
    environment:
      name: pypi
      url: https://pypi.org/p/site-context-pipeline
    permissions:
      id-token: write

    steps:
      - name: Download built distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
