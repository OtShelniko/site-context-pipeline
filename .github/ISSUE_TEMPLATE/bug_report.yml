name: Bug report
description: Something does not behave as documented.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please do not paste real
        client data, API keys, or scraped HTML — synthesize a minimal failing
        example using fake `example.com` URLs.
  - type: input
    id: version
    attributes:
      label: Package version
      description: Output of `python -c "import site_context_pipeline; print(site_context_pipeline.__version__)"`
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.9"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - Linux
        - macOS
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command you ran
      description: Paste the exact CLI invocation.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What happened
      description: Include the JSON payload from stdout if available. Redact any sensitive values.
      render: text
    validations:
      required: true
  - type: textarea
    id: input-shape
    attributes:
      label: Input shape (no real data)
      description: |
        For input-related bugs, describe the shape of your CSV/JSON: column
        names, row count, any unusual values. Paste a 2-3 row synthetic
        example, not your real file.
      render: text
